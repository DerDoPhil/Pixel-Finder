<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DoPhil's Pixel Hunter</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #EFEFEF;
      --bg2:      #E4E4E4;
      --ink:      #121212;
      --ink2:     #555555;
      --border:   #121212;
      --ff-head:  'Silkscreen', monospace;
      --ff-body:  'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--ff-body);
      font-size: 12px;
      letter-spacing: 0.04em;
      min-height: 100vh;
    }
    body.dark {
      --bg:     #111111;
      --bg2:    #1a1a1a;
      --ink:    #EFEFEF;
      --ink2:   #888888;
      --border: #EFEFEF;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--ink2); }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 48px;
    }
    .nav-tabs { display: flex; gap: 0; align-items: center; }
    .nav-tab {
      font-family: var(--ff-head);
      font-size: 11px;
      color: var(--ink2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0 20px;
      height: 48px;
      display: flex; align-items: center;
      transition: color 0.1s, border-color 0.1s;
    }
    .nav-tab:hover { color: var(--ink); }
    .nav-tab.active { color: var(--ink); border-bottom-color: var(--ink); }

    /* LAYOUT */
    .page { max-width: 1200px; margin: 0 auto; padding: 0 32px; }

    /* HERO */
    .hero {
      padding: 72px 0 56px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .hero-label {
      font-family: var(--ff-body);
      font-size: 10px;
      letter-spacing: 0.16em;
      color: var(--ink2);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-family: var(--ff-head);
      font-size: clamp(28px, 5vw, 52px);
      text-transform: uppercase;
      line-height: 1.1;
      letter-spacing: 0.04em;
      color: var(--ink);
      margin-bottom: 24px;
    }
    .hero-sub {
      font-family: var(--ff-body);
      font-size: 11px;
      color: var(--ink2);
      line-height: 2;
      letter-spacing: 0.06em;
      max-width: 560px;
      margin: 0 auto 36px;
    }
    .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: center; }

    /* BUTTONS */
    .btn {
      font-family: var(--ff-body);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--ink);
      padding: 10px 20px;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background 0.1s, color 0.1s;
      border-radius: 0;
    }
    .btn:hover { background: var(--ink); color: var(--bg); }
    .btn-fill { background: var(--ink); color: var(--bg); }
    .btn-fill:hover { background: var(--bg); color: var(--ink); }
    .btn-sm { padding: 6px 12px; font-size: 9px; }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      border: 1px solid var(--border);
      border-bottom: none;
    }
    .stat-cell {
      padding: 20px 24px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .stat-cell:last-child { border-right: none; }
    @media (max-width: 700px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .stat-cell:nth-child(3) { border-right: none; }
      .stat-cell:nth-child(4) { border-right: 1px solid var(--border); }
    }
    @media (max-width: 420px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .stat-cell:nth-child(odd) { border-right: 1px solid var(--border); }
      .stat-cell:nth-child(even) { border-right: none; }
    }
    .stat-label {
      font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink2); margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--ff-head);
      font-size: 16px; color: var(--ink); letter-spacing: 0.02em;
    }
    .stat-sub { font-size: 8px; color: var(--ink2); margin-top: 3px; }

    .section-label {
      font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--ink2); margin-bottom: 24px; display: flex; gap: 10px; align-items: center;
    }
    .section-label::after { content:""; flex:1; height:1px; background: var(--border); opacity: 0.2; }

    /* PIXEL CALCULATOR */
    .calc-section {
      padding: 32px 0;
      border-bottom: 1px solid var(--border);
    }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .calc-cell {
      padding: 16px 20px;
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .calc-cell:last-child { border-right: none; }
    .calc-cell-label { font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink2); margin-bottom: 6px; }
    .calc-cell-value { font-family: var(--ff-head); font-size: 18px; color: var(--ink); }
    .calc-cell-sub { font-size: 8px; color: var(--ink2); margin-top: 4px; }
    .calc-input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .calc-candidates { border: 1px solid var(--border); }
    .calc-candidate-row {
      display: flex; gap: 12px; align-items: center; padding: 10px 14px;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s;
    }
    .calc-candidate-row:last-child { border-bottom: none; }
    .calc-candidate-row:hover { background: var(--ink); color: var(--bg); }
    .calc-candidate-row:hover .calc-cand-sub { color: rgba(255,255,255,0.5); }

    /* FILTERS */
    .filters-bar {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-label { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink2); white-space: nowrap; }
    input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--ff-body);
      font-size: 10px;
      padding: 7px 10px;
      outline: none;
      letter-spacing: 0.04em;
      border-radius: 0;
      width: 120px;
    }
    input[type=text]:focus { outline: 2px solid var(--ink); outline-offset: -2px; }
    .toggle-btn {
      font-family: var(--ff-body);
      font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
      background: none; border: 1px solid var(--border);
      color: var(--ink2); padding: 6px 10px; cursor: pointer; border-radius: 0;
      transition: all 0.1s;
    }
    .toggle-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .results-count { margin-left: auto; font-size: 9px; color: var(--ink2); letter-spacing: 0.08em; }

    /* TOP 3 */
    .top3-section { padding: 32px 0; border-bottom: 1px solid var(--border); }
    .top3-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 0; border: 1px solid var(--border); }
    .top3-card {
      padding: 20px 22px;
      border-right: 1px solid var(--border);
      cursor: pointer;
      display: flex; gap: 16px; align-items: flex-start;
      transition: background 0.1s;
    }
    .top3-card:last-child { border-right: none; }
    .top3-card:hover { background: var(--ink); color: var(--bg); }
    .top3-card:hover .top3-sub, .top3-card:hover .top3-ap { color: rgba(255,255,255,0.5); }
    .top3-medal { font-size: 24px; line-height: 1; }
    .top3-name { font-family: var(--ff-head); font-size: 12px; text-transform: uppercase; margin-bottom: 4px; }
    .top3-price { font-family: var(--ff-head); font-size: 18px; letter-spacing: 0.02em; margin-bottom: 4px; }
    .top3-sub { font-size: 8px; color: var(--ink2); line-height: 1.8; }
    .top3-ap { font-size: 8px; color: var(--ink2); }

    /* PROGRESS */
    .progress-bar-wrap { padding: 16px 0; }
    .progress-bar-info { display: flex; justify-content: space-between; font-size: 8px; letter-spacing: 0.1em; color: var(--ink2); margin-bottom: 6px; text-transform: uppercase; }
    .progress-track { height: 2px; background: var(--bg2); border: 1px solid var(--border); }
    .progress-fill { height: 100%; background: var(--ink); transition: width 0.3s ease; }

    /* LOADING */
    .loading-state { padding: 80px 0; text-align: center; }
    .blink { animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
    .loading-text { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink2); margin-top: 12px; }

    /* ERROR */
    .error-box {
      border: 1px solid var(--border); padding: 24px; max-width: 600px; margin: 32px 0;
    }
    .error-title { font-family: var(--ff-head); font-size: 13px; text-transform: uppercase; margin-bottom: 12px; }
    .error-body { font-size: 9px; line-height: 1.9; color: var(--ink2); white-space: pre-wrap; }

    /* NFT GRID */
    .nft-section { padding: 32px 0; }
    .nft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .nft-card {
      background: var(--bg);
      cursor: pointer;
      transition: background 0.1s;
      display: flex; flex-direction: column;
      animation: fadeIn 0.3s ease both;
    }
    .nft-card:hover { background: var(--ink); color: var(--bg); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .nft-img-wrap { position: relative; aspect-ratio: 1/1; background: var(--bg2); overflow: hidden; }
    .nft-img-wrap img { width:100%; height:100%; object-fit:cover; image-rendering:pixelated; display:block; filter: grayscale(100%); }
    .nft-card:hover .nft-img-wrap img { filter: grayscale(100%) invert(1); }
    .nft-badge-tl { position:absolute; top:8px; left:8px; display:flex; gap:4px; }
    .nft-badge-tr { position:absolute; top:8px; right:8px; }
    .badge {
      font-family: var(--ff-body); font-size: 8px; letter-spacing: 0.06em;
      background: var(--bg); color: var(--ink); border: 1px solid var(--border);
      padding: 2px 5px; text-transform: uppercase;
    }
    .badge-inv { background: var(--ink); color: var(--bg); }
    .nft-card:hover .badge { background: var(--ink); color: var(--bg); }
    .nft-card:hover .badge-inv { background: var(--bg); color: var(--ink); }
    .nft-overlay {
      position:absolute; inset:0; background: rgba(0,0,0,0.0);
      display:flex; align-items:center; justify-content:center;
      font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
      opacity:0; transition: opacity 0.15s;
    }
    .nft-card:hover .nft-overlay { opacity:1; }

    .nft-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; flex:1; }
    .nft-name { font-family: var(--ff-head); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    .nft-price-row { display:flex; align-items:baseline; gap:8px; }
    .nft-eth { font-family: var(--ff-head); font-size: 15px; letter-spacing: 0.02em; }
    .nft-usd { font-size: 9px; color: var(--ink2); }
    .nft-card:hover .nft-usd { color: rgba(255,255,255,0.5); }

    .px-bar-wrap { display: flex; flex-direction: column; gap: 3px; }
    .px-bar-info { display: flex; justify-content: space-between; font-size: 8px; color: var(--ink2); letter-spacing: 0.06em; text-transform: uppercase; }
    .nft-card:hover .px-bar-info { color: rgba(255,255,255,0.5); }
    .px-track { height: 2px; background: rgba(0,0,0,0.12); border: 1px solid var(--border); }
    .nft-card:hover .px-track { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
    .px-fill { height: 100%; background: var(--ink); transition: width 0.5s ease; }
    .nft-card:hover .px-fill { background: var(--bg); }

    .cpp-box {
      border: 1px solid var(--border);
      display: flex; gap: 0;
    }
    .cpp-half {
      flex:1; padding: 8px 10px; border-right: 1px solid var(--border);
    }
    .cpp-half:last-child { border-right: none; }
    .cpp-label { font-size: 7px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink2); margin-bottom: 3px; }
    .cpp-val { font-family: var(--ff-head); font-size: 13px; letter-spacing: 0.02em; }
    .cpp-sub { font-size: 7px; color: var(--ink2); margin-top: 2px; }
    .nft-card:hover .cpp-box { border-color: rgba(255,255,255,0.3); }
    .nft-card:hover .cpp-half { border-color: rgba(255,255,255,0.3); }
    .nft-card:hover .cpp-label { color: rgba(255,255,255,0.4); }
    .nft-card:hover .cpp-sub { color: rgba(255,255,255,0.4); }

    .ap-tag-guaranteed {
      font-size: 7px; letter-spacing: 0.06em; text-transform: uppercase;
      border: 1px solid var(--ink); padding: 1px 5px; color: var(--ink);
      font-weight: 700;
    }
    .nft-card:hover .ap-tag-guaranteed { border-color: rgba(255,255,255,0.8); color: rgba(255,255,255,0.9); }

    .ap-guaranteed-box {
      border: 1px solid var(--ink);
      padding: 7px 10px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .ap-guaranteed-label { font-size: 7px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink2); }
    .ap-guaranteed-val { font-family: var(--ff-head); font-size: 13px; letter-spacing: 0.02em; }
    .ap-guaranteed-sub { font-size: 7px; color: var(--ink2); margin-top: 2px; }
    .nft-card:hover .ap-guaranteed-box { border-color: rgba(255,255,255,0.6); }
    .nft-card:hover .ap-guaranteed-label { color: rgba(255,255,255,0.4); }
    .nft-card:hover .ap-guaranteed-sub { color: rgba(255,255,255,0.4); }

    .ap-tags { display:flex; flex-wrap:wrap; gap:3px; }
    .ap-tag { font-size: 7px; letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid var(--border); padding: 1px 5px; color: var(--ink2); }
    .nft-card:hover .ap-tag { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.5); }

    .deal-bar-wrap { display:flex; flex-direction:column; gap:3px; }
    .deal-bar-info { display:flex; justify-content:space-between; font-size:8px; color:var(--ink2); text-transform:uppercase; letter-spacing:0.06em; }
    .nft-card:hover .deal-bar-info { color: rgba(255,255,255,0.4); }
    .deal-track { height:2px; background:rgba(0,0,0,0.1); border:1px solid var(--border); }
    .nft-card:hover .deal-track { background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.2); }
    .deal-fill { height:100%; background: var(--ink); transition: width 0.5s ease; }
    .nft-card:hover .deal-fill { background: var(--bg); }

    /* SKELETON */
    .skeleton-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); margin-top:1px; }
    .skeleton-card { background:var(--bg); opacity:0.5; }
    .skeleton-img { aspect-ratio:1/1; background: var(--bg2); animation: pulse 1.5s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .skeleton-body { padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
    .skeleton-line { background:var(--bg2); height:10px; animation: pulse 1.5s ease infinite; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 32px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .footer-text { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink2); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const OPENSEA_KEY = "8e94b5cf550d4689aa7f76e93ccb706f";
const SLUG        = "normies";
const NORMIES_API = "https://api.normies.art";
const CONTRACT    = "0x9eb6e2025b64f340691e424b7fe7022ffde12438";

const TIERS = [
  { id:1, label:"T1", min:0,   max:490,      minPct:1, maxPct:4 },
  { id:2, label:"T2", min:491, max:890,      minPct:2, maxPct:4 },
  { id:3, label:"T3", min:891, max:Infinity, minPct:3, maxPct:4 },
];
function getTier(px) { return TIERS.find(t => px >= t.min && px <= t.max) || TIERS[0]; }

function calcCPP(px, ap, eth, usd) {
  const tier         = getTier(px);
  const priceUsd     = eth * usd;
  // AP from Pixel Count trait → goes through tier% (luck-based)
  const luckMin      = Math.floor(px * tier.minPct / 100);
  const luckMax      = Math.floor(px * tier.maxPct / 100);
  // AP from existing AP trait → transfers 100% always, guaranteed, no luck involved
  const guaranteedAP = ap || 0;
  const totMin       = guaranteedAP + luckMin;
  const totMax       = guaranteedAP + luckMax;
  // keep legacy names for backward compat
  const newMin = luckMin;
  const newMax = luckMax;
  return { tier, priceUsd, newMin, newMax, luckMin, luckMax, guaranteedAP, totMin, totMax,
    best:  totMax > 0 ? priceUsd / totMax : Infinity,
    worst: totMin > 0 ? priceUsd / totMin : Infinity,
  };
}

async function fetchJ(url, opts={}) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function fetchEthUsd() {
  try { const d = await fetchJ("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd"); return d?.ethereum?.usd ?? null; }
  catch { try { const d = await fetchJ("https://api.coinbase.com/v2/prices/ETH-USD/spot"); return parseFloat(d?.data?.amount)||null; } catch { return null; } }
}
const H = { "X-API-KEY": OPENSEA_KEY, accept: "application/json" };
const apiListings = async () => {
  let all = [], cursor = null;
  do {
    const url = `https://api.opensea.io/api/v2/listings/collection/${SLUG}/all?limit=100&order_by=eth_price&order_direction=asc`+(cursor?`&next=${cursor}`:"");
    const data = await fetchJ(url, {headers:H});
    all = all.concat(data.listings||[]);
    cursor = data.next||null;
  } while (cursor);
  return { listings: all };
};
const apiStats    = () => fetchJ(`https://api.opensea.io/api/v2/collections/${SLUG}/stats`, {headers:H});
const apiMeta     = (id) => fetchJ(`${NORMIES_API}/normie/${id}/metadata`);

function parseEth(l) { try { return parseFloat(l.price?.current?.value) / Math.pow(10, l.price?.current?.decimals??18); } catch { return null; } }
function parseTok(l) { try { return l.protocol_data?.parameters?.offer?.[0]?.identifierOrCriteria; } catch { return null; } }

const $  = (n) => !isFinite(n)||n==null ? "—" : n<0.01?`$${n.toFixed(4)}`:n<1?`$${n.toFixed(3)}`:`$${n.toFixed(2)}`;
const Ξ  = (n) => n==null ? "—" : `${parseFloat(n).toFixed(4)} ETH`;
const N  = (n) => n?.toLocaleString() ?? "—";

// ── NFT Card ──────────────────────────────────────────────────────────────────
function NFTCard({ item, rank, ethUsd, bestCPP }) {
  const [hov, setHov] = React.useState(false);
  const { tokenId, priceEth, pixelCount, existingAP, traits, imageUrl, loading, error } = item;
  const c   = (pixelCount!=null&&priceEth&&ethUsd) ? calcCPP(pixelCount,existingAP||0,priceEth,ethUsd) : null;
  const rel = c && bestCPP>0 ? Math.min(1, bestCPP/c.best) : 0;

  return (
    <div className="nft-card"
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      onClick={()=>window.open(`https://opensea.io/assets/ethereum/${CONTRACT}/${tokenId}`,"_blank")}
      style={{animationDelay:`${Math.min(rank-1,12)*25}ms`}}
    >
      <div className="nft-img-wrap">
        <div className="nft-badge-tl">
          <span className="badge">#{rank}</span>
          {rank<=3 && <span className="badge badge-inv">TOP</span>}
        </div>
        {existingAP>0 && <div className="nft-badge-tr"><span className="badge badge-inv">{existingAP} AP</span></div>}
        {imageUrl
          ? <img src={imageUrl} alt={`#${tokenId}`}/>
          : loading
            ? <div className="skeleton-img"/>
            : <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"var(--ink2)"}}>?</div>

          <div className="px-bar-wrap">

          {/* GUARANTEED AP from existing AP trait — always 100%, no luck */}

            <div className="ap-guaranteed-box">
              <div>
                <div className="ap-guaranteed-label">✓ GUARANTEED AP (existing trait · 100%)</div>
                <div className="ap-guaranteed-val">+{c.guaranteedAP} AP</div>
                <div className="ap-guaranteed-sub">Transfers fully regardless of luck</div>
              </div>

          )}

          {/* LUCK-BASED AP from Pixel Count via tier% */}
          <div className="cpp-box">
            <div className="cpp-half">
              <div className="cpp-label">🎲 BEST (4% luck)</div>
              <div className="cpp-val">{$(c.best)}/px</div>
              <div className="cpp-sub">
                {c.guaranteedAP > 0
                  ? `${c.guaranteedAP} fixed + ${c.luckMax} luck = ${c.totMax} AP`
                  : `${c.totMax} AP total`}
              </div>
            </div>
            <div className="cpp-half">
              <div className="cpp-label">🎲 WORST ({c.tier.minPct}% luck)</div>
              <div className="cpp-val">{$(c.worst)}/px</div>
              <div className="cpp-sub">
                {c.guaranteedAP > 0
                  ? `${c.guaranteedAP} fixed + ${c.luckMin} luck = ${c.totMin} AP`
                  : `${c.totMin} AP total`}
              </div>
            </div>
          </div>

          <div className="ap-tags">
            {c.guaranteedAP > 0
              ? <span className="ap-tag-guaranteed">✓ {c.guaranteedAP} AP guaranteed</span>
              : null}
            <span className="ap-tag">🎲 +{c.luckMin}–{c.luckMax} from pixels ({c.tier.label})</span>
            <span className="ap-tag">= {c.totMin}–{c.totMax} AP total</span>
          </div>

          <div className="deal-bar-wrap">
            <div className="deal-bar-info">
              <span>DEAL QUALITY</span><span>{(rel*100).toFixed(0)}% of best</span>
            </div>
            <div className="deal-track"><div className="deal-fill" style={{width:`${rel*100}%`}}/></div>
          </div>

          {traits?.length>0&&(
            <div className="ap-tags">
              {traits.slice(0,3).map((t,i)=><span key={i} className="ap-tag">{t.value}</span>)}
            </div>
          )}
        </>)}

        {!loading&&error&&<div style={{fontSize:8,color:"var(--ink2)"}}>METADATA UNAVAILABLE</div>}
      </div>
    </div>
  );
}

// ── Diff Canvas ───────────────────────────────────────────────────────────────
function DiffCanvas({ userBits, normieBits, sz }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    for (let y = 0; y < sz; y++) {
      for (let x = 0; x < sz; x++) {
        const i = y*sz+x;
        const u = userBits[i];
        const n = normieBits[i];
        if (u === '1' && n === '0') ctx.fillStyle = '#EE4444'; // canvas black, normie white → rot
        else if (u === '0' && n === '1') ctx.fillStyle = '#4488EE'; // normie black, canvas white → blau
        else if (u === '1' && n === '1') ctx.fillStyle = '#121212'; // both black
        else ctx.fillStyle = '#FFFFFF'; // both white
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }, [userBits, normieBits]);

  return (
    <div style={{padding:'0 14px 12px',display:'flex',gap:12,alignItems:'flex-start'}}>
      <canvas ref={ref} width={sz} height={sz}
        style={{width:160,height:160,imageRendering:'pixelated',border:'1px solid var(--border)',flexShrink:0}}/>
      <div style={{fontSize:8,color:'var(--ink2)',lineHeight:2,letterSpacing:'0.06em',textTransform:'uppercase',paddingTop:4}}>
        <div><span style={{display:'inline-block',width:8,height:8,background:'#EE4444',marginRight:6,verticalAlign:'middle'}}/>Canvas has pixel, Normie does not</div>
        <div><span style={{display:'inline-block',width:8,height:8,background:'#4488EE',marginRight:6,verticalAlign:'middle'}}/>Normie has extra pixel</div>
        <div><span style={{display:'inline-block',width:8,height:8,background:'#121212',marginRight:6,verticalAlign:'middle'}}/>Both black</div>
      </div>
    </div>
  );
}

// ── Normie Hunter ─────────────────────────────────────────────────────────────
// ── Normie Hunter ─────────────────────────────────────────────────────────────
function NormieHunter() {
  const SZ = 40, INK = '#121212', BG = '#FFFFFF', BASE = 8;

  // ── Core state ──
  const [pixels,    setPixels]   = React.useState(Array(SZ*SZ).fill(BG));
  const [tool,      setTool]     = React.useState('draw'); // draw|erase|circle|square
  const [zoom,      setZoom]     = React.useState(1);
  const [pan,       setPan]      = React.useState({x:0,y:0});
  const [preview,   setPreview]  = React.useState(null); // Set of indices for shape preview
  const [overlay,   setOverlay]  = React.useState(null); // {img,x,y,scale,opacity,locked}

  // ── Scan state ──
  const [tokenInput,    setTokenInput]    = React.useState('');
  const [tokenLoading,  setTokenLoading]  = React.useState(false);
  const [tokenError,    setTokenError]    = React.useState(null);
  const [scanning,      setScanning]      = React.useState(false);
  const [scanProg,      setScanProg]      = React.useState(0);
  const [scanTotal,     setScanTotal]     = React.useState(0);
  const [scanMsg,       setScanMsg]       = React.useState('');
  const [matches,       setMatches]       = React.useState([]);
  const [diffToken,     setDiffToken]     = React.useState(null);

  // ── Refs ──
  const canvasRef    = React.useRef(null);
  const containerRef = React.useRef(null);
  const fileInputRef = React.useRef(null);
  const activeRef    = React.useRef(null); // current interaction
  const lastGridRef  = React.useRef(null); // last painted grid pos
  const pinchRef     = React.useRef(null);
  // Keep latest state accessible in event handlers without stale closures
  const S = React.useRef({});
  S.current = {pixels, tool, zoom, pan, preview, overlay};

  const cellSize = (z = S.current.zoom) => BASE * z;

  // ── Grid coordinate from client position ──
  const toGrid = (cx, cy) => {
    const rect = containerRef.current.getBoundingClientRect();
    const cs   = cellSize();
    const gx   = Math.floor((cx - rect.left - S.current.pan.x) / cs);
    const gy   = Math.floor((cy - rect.top  - S.current.pan.y) / cs);
    return {gx, gy, ok: gx>=0&&gx<SZ&&gy>=0&&gy<SZ};
  };

  // ── Bresenham line (for swipe painting) ──
  const lineIndices = (x0,y0,x1,y1) => {
    const pts=[]; let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy;
    for(;;){if(x0>=0&&x0<SZ&&y0>=0&&y0<SZ)pts.push(y0*SZ+x0);if(x0===x1&&y0===y1)break;const e2=2*err;if(e2>-dy){err-=dy;x0+=sx;}if(e2<dx){err+=dx;y0+=sy;}}
    return pts;
  };

  // ── Shape helpers ──
  const circleIndices = (x0,y0,x1,y1) => {
    const cx=(x0+x1)/2, cy=(y0+y1)/2, rx=Math.abs(x1-x0)/2, ry=Math.abs(y1-y0)/2;
    const set=new Set();
    for(let a=0;a<360;a+=0.5){
      const rad=a*Math.PI/180;
      const x=Math.round(cx+rx*Math.cos(rad)), y=Math.round(cy+ry*Math.sin(rad));
      if(x>=0&&x<SZ&&y>=0&&y<SZ) set.add(y*SZ+x);
    }
    return set;
  };
  const squareIndices = (x0,y0,x1,y1) => {
    const set=new Set();
    const lx=Math.max(0,Math.min(x0,x1)),rx=Math.min(SZ-1,Math.max(x0,x1));
    const ty=Math.max(0,Math.min(y0,y1)),by=Math.min(SZ-1,Math.max(y0,y1));
    for(let x=lx;x<=rx;x++){set.add(ty*SZ+x);set.add(by*SZ+x);}
    for(let y=ty;y<=by;y++){set.add(y*SZ+lx);set.add(y*SZ+rx);}
    return set;
  };

  // ── Pan clamping ──
  const clampPan = (x,y,z) => {
    const ws=SZ*BASE*z, vp=320;
    return { x: ws<=vp ? 0 : Math.min(0,Math.max(vp-ws,x)),
             y: ws<=vp ? 0 : Math.min(0,Math.max(vp-ws,y)) };
  };

  // ── Draw canvas (runs on every render) ──
  React.useEffect(() => {
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    // Pixels
    const {pixels:px,preview:pv,overlay:ov}=S.current;
    ctx.clearRect(0,0,SZ,SZ);
    ctx.fillStyle=BG; ctx.fillRect(0,0,SZ,SZ);
    for(let i=0;i<SZ*SZ;i++) if(px[i]===INK){ctx.fillStyle=INK;ctx.fillRect(i%SZ,Math.floor(i/SZ),1,1);}
    // Shape preview
    if(pv){ctx.fillStyle='rgba(18,18,18,0.55)';pv.forEach(i=>ctx.fillRect(i%SZ,Math.floor(i/SZ),1,1));}
    // Overlay image
    if(ov?.img){ctx.save();ctx.globalAlpha=ov.opacity;ctx.imageSmoothingEnabled=false;ctx.drawImage(ov.img,ov.x,ov.y,SZ*ov.scale,SZ*ov.scale);ctx.restore();}
  });

  // ── Event helpers ──
  const getXY = e => e.touches ? {cx:e.touches[0].clientX,cy:e.touches[0].clientY} : {cx:e.clientX,cy:e.clientY};

  const paintPixels = (indices, erase) => {
    setPixels(prev=>{const n=[...prev];indices.forEach(i=>{n[i]=erase?BG:INK;});return n;});
  };

  // ── Pointer down ──
  const onDown = e => {
    e.preventDefault();
    const {cx,cy} = getXY(e);

    // Two-finger pinch
    if(e.touches?.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchRef.current={dist:Math.sqrt(dx*dx+dy*dy),zoom:S.current.zoom,pan:{...S.current.pan}};
      activeRef.current={type:'pinch'}; return;
    }

    const {gx,gy,ok}=toGrid(cx,cy);

    // Overlay drag (when not locked)
    if(S.current.overlay && !S.current.overlay.locked){
      activeRef.current={type:'overlay',sx:gx,sy:gy,ox:S.current.overlay.x,oy:S.current.overlay.y}; return;
    }

    const t=S.current.tool;
    if(t==='draw'||t==='erase'){
      const erase=t==='erase'||e.button===2;
      activeRef.current={type:'paint',erase};
      lastGridRef.current={gx,gy};
      if(ok) paintPixels([gy*SZ+gx],erase);
    } else if((t==='circle'||t==='square')&&ok){
      activeRef.current={type:'shape',kind:t,sx:gx,sy:gy};
      setPreview(new Set());
    }
  };

  // ── Pointer move ──
  const onMove = e => {
    e.preventDefault();
    if(!activeRef.current) return;
    const {cx,cy}=getXY(e);
    const act=activeRef.current;

    // Pinch zoom
    if(act.type==='pinch'&&e.touches?.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const newZ=Math.max(1,Math.min(8,pinchRef.current.zoom*dist/pinchRef.current.dist));
      setZoom(newZ); setPan(p=>clampPan(p.x,p.y,newZ)); return;
    }

    const {gx,gy,ok}=toGrid(cx,cy);

    if(act.type==='paint'&&ok){
      const last=lastGridRef.current||{gx,gy};
      const indices=lineIndices(last.gx,last.gy,gx,gy);
      paintPixels(indices,act.erase);
      lastGridRef.current={gx,gy};
    }

    if(act.type==='shape'){
      const s=act.kind==='circle'?circleIndices(act.sx,act.sy,gx,gy):squareIndices(act.sx,act.sy,gx,gy);
      setPreview(s);
    }

    if(act.type==='overlay'){
      const dx=gx-act.sx, dy=gy-act.sy;
      setOverlay(prev=>prev?({...prev,x:act.ox+dx,y:act.oy+dy}):prev);
    }
  };

  // ── Pointer up ──
  const onUp = e => {
    if(!activeRef.current) return;
    if(activeRef.current.type==='shape'&&S.current.preview?.size){
      paintPixels([...S.current.preview],false);
      setPreview(null);
    }
    activeRef.current=null; pinchRef.current=null; lastGridRef.current=null;
  };

  // ── Load token onto canvas ──
  const loadToken = async () => {
    const id=tokenInput.trim(); if(!id) return;
    setTokenLoading(true); setTokenError(null);
    try {
      const img=new Image(); img.crossOrigin='anonymous';
      await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=`${NORMIES_API}/normie/${id}/image.png`;});
      const off=document.createElement('canvas'); off.width=SZ;off.height=SZ;
      const ctx=off.getContext('2d');ctx.imageSmoothingEnabled=false;ctx.drawImage(img,0,0,SZ,SZ);
      const d=ctx.getImageData(0,0,SZ,SZ).data;
      setPixels(Array.from({length:SZ*SZ},(_,i)=>{
        const a=d[i*4+3]; if(a<10) return BG;
        return (d[i*4]+d[i*4+1]+d[i*4+2])/3<180?INK:BG;
      }));
    } catch{setTokenError('Could not load #'+id);}
    setTokenLoading(false);
  };

  // ── Image upload → overlay ──
  const handleUpload = e => {
    const file=e.target.files[0]; if(!file) return;
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>setOverlay({img,x:0,y:0,scale:1,opacity:0.5,locked:true});
    img.src=url; e.target.value='';
  };

  // ── Apply overlay to pixels ──
  const applyOverlay = mode => {
    const ov=S.current.overlay; if(!ov?.img) return;
    const off=document.createElement('canvas');off.width=SZ;off.height=SZ;
    const ctx=off.getContext('2d');ctx.imageSmoothingEnabled=false;
    ctx.drawImage(ov.img,ov.x,ov.y,SZ*ov.scale,SZ*ov.scale);
    const d=ctx.getImageData(0,0,SZ,SZ).data;
    setPixels(prev=>{
      const n=mode==='replace'?Array(SZ*SZ).fill(BG):[...prev];
      for(let i=0;i<SZ*SZ;i++) if(d[i*4+3]>10&&(d[i*4]+d[i*4+1]+d[i*4+2])/3<128) n[i]=INK;
      return n;
    });
  };

  // ── Scan ──
  const fmtTime = s => s<60?`~${Math.ceil(s)}s`:`~${Math.floor(s/60)}m ${Math.ceil(s%60)}s`;

  const fetchBits = async id => {
    try {
      const raw=await fetchJ(`${NORMIES_API}/normie/${id}/pixels`);
      const bits=typeof raw==='string'?raw.trim():(raw.pixels??raw.data??raw.bits??Object.values(raw)[0]);
      if(typeof bits==='string'&&/^[01]+$/.test(bits)&&bits.length===1600) return bits;
    } catch{}
    const img=new Image();img.crossOrigin='anonymous';
    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=`${NORMIES_API}/normie/${id}/image.png`;});
    const off=document.createElement('canvas');off.width=SZ;off.height=SZ;
    const ctx=off.getContext('2d');ctx.imageSmoothingEnabled=false;ctx.drawImage(img,0,0,SZ,SZ);
    const d=ctx.getImageData(0,0,SZ,SZ).data;
    let b='';for(let i=0;i<SZ*SZ;i++){const a=d[i*4+3];b+=a<10?'0':(d[i*4]+d[i*4+1]+d[i*4+2])/3<180?'1':'0';}
    return b;
  };

  const scan = async () => {
    setScanning(true);setMatches([]);setDiffToken(null);setScanProg(0);setScanTotal(0);
    setScanMsg('Fetching token list...');
    const userBits=S.current.pixels.map(c=>c===BG?'0':'1').join('');
    let tokenIds=[];
    const t0=Date.now();
    try {
      let cursor=null;
      do {
        const url=`https://api.opensea.io/api/v2/collection/${SLUG}/nfts?limit=200`+(cursor?`&next=${cursor}`:'');
        const data=await fetchJ(url,{headers:H});
        tokenIds=tokenIds.concat((data.nfts||[]).map(n=>n.identifier).filter(Boolean));
        cursor=data.next||null;
        setScanMsg(`Fetching token list... ${tokenIds.length} found`);
      } while(cursor);
    } catch(e){setScanMsg('Error: '+e.message);setScanning(false);return;}
    const total=tokenIds.length; setScanTotal(total);
    const fetchSecs=(Date.now()-t0)/1000;
    const estSecs=Math.round((total/20)*(fetchSecs/Math.ceil(total/200))*1.5);
    setScanMsg(`${total} Normies found · Est. ${fmtTime(estSecs)}`);
    await new Promise(r=>setTimeout(r,600));
    let top10=[],done=0;
    const startTime=Date.now();
    const BATCH=20;
    for(let i=0;i<total;i+=BATCH){
      const results=await Promise.all(tokenIds.slice(i,i+BATCH).map(async id=>{
        try{const bits=await fetchBits(id);let diff=0;for(let p=0;p<1600;p++)if(userBits[p]!==bits[p])diff++;return{id,diff,bits};}catch{return null;}
      }));
      for(const r of results){if(!r)continue;top10.push(r);}
      top10.sort((a,b)=>a.diff-b.diff);if(top10.length>10)top10=top10.slice(0,10);
      setMatches([...top10]);
      done+=results.length;setScanProg(done);
      const elapsed=(Date.now()-startTime)/1000,rate=done/elapsed,rem=rate>0?(total-done)/rate:0;
      setScanMsg(`Scanning... ${done}/${total} · ${fmtTime(rem)} remaining`);
    }
    setScanMsg(`Done — ${total} Normies scanned.`);setScanning(false);
  };

  // ── Tool buttons config ──
  const tools=[
    {id:'draw',  label:'✏ Draw'},
    {id:'erase', label:'◻ Erase'},
    {id:'circle',label:'○ Circle'},
    {id:'square',label:'□ Square'},
  ];

  const ws = SZ * cellSize(zoom); // workspace size in px

  return (
    <div>
      <div className="hero">
        <div className="hero-label">Normies NFT · Pixel Canvas Editor · On-Chain Scan</div>
        <h1>DoPhil's<br/>Normie Hunter</h1>
        <p className="hero-sub">
          Paint a 40×40 pixel canvas and scan all Normies.<br/>
          Find the closest match — pixel by pixel, bit by bit.
        </p>
      </div>
      <div style={{maxWidth:980,margin:'0 auto',padding:'32px 16px'}}>

      {/* Load token */}
      <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:20,flexWrap:'wrap'}}>
        <input type="text" value={tokenInput} onChange={e=>setTokenInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&loadToken()} placeholder="Load token ID as starting point..."/>
        <button className="btn btn-fill" onClick={loadToken} disabled={tokenLoading}>{tokenLoading?'LOADING...':'LOAD →'}</button>
      </div>
      {tokenError&&<div style={{textAlign:'center',color:'var(--ink2)',fontSize:9,marginBottom:12}}>⚠ {tokenError}</div>}

      <div style={{display:'flex',gap:32,flexWrap:'wrap',justifyContent:'center',alignItems:'flex-start'}}>

        {/* ── Left: toolbar + canvas ── */}
        <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'center'}}>

          {/* Toolbar row 1: tools */}
          <div style={{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'center',maxWidth:320}}>
            {tools.map(t=>(
              <button key={t.id} className={`toggle-btn${tool===t.id?' active':''}`}
                style={{padding:'6px 12px',fontSize:9,touchAction:'manipulation'}}
                onClick={()=>setTool(t.id)}>{t.label}</button>
            ))}
            <button className="toggle-btn" style={{padding:'6px 12px',fontSize:9,touchAction:'manipulation'}}
              onClick={()=>fileInputRef.current.click()}>⬆ Upload</button>
            <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleUpload}/>
          </div>

          {/* Toolbar row 2: zoom + clear */}
          <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap',justifyContent:'center'}}>
            <button className="toggle-btn" style={{padding:'6px 14px',fontSize:11,touchAction:'manipulation'}}
              onClick={()=>{const z=Math.min(8,zoom+0.5);setZoom(z);setPan(p=>clampPan(p.x,p.y,z));}}>＋</button>
            <span style={{fontSize:8,color:'var(--ink2)',letterSpacing:'0.08em',minWidth:40,textAlign:'center',textTransform:'uppercase'}}>
              {zoom===1?'1×':`${zoom.toFixed(1)}×`}
            </span>
            <button className="toggle-btn" style={{padding:'6px 14px',fontSize:11,touchAction:'manipulation'}}
              onClick={()=>{const z=Math.max(1,zoom-0.5);setZoom(z);setPan(clampPan(0,0,z));}}>－</button>
            <button className="toggle-btn" style={{padding:'6px 12px',fontSize:9,touchAction:'manipulation'}}
              onClick={()=>{setZoom(1);setPan({x:0,y:0});}}>Reset</button>
            <button className="toggle-btn" style={{padding:'6px 12px',fontSize:9,touchAction:'manipulation'}}
              onClick={()=>setPixels(Array(SZ*SZ).fill(BG))}>Clear</button>
          </div>

          {/* Canvas viewport */}
          <div ref={containerRef}
            style={{width:320,height:320,border:'1px solid var(--border)',overflow:'hidden',position:'relative',touchAction:'none',userSelect:'none',cursor:tool==='draw'?'crosshair':tool==='erase'?'cell':'default'}}
            onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
            onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
            onContextMenu={e=>e.preventDefault()}
          >
            <div style={{position:'absolute',left:pan.x,top:pan.y,width:ws,height:ws}}>
              <canvas ref={canvasRef} width={SZ} height={SZ}
                style={{width:ws,height:ws,imageRendering:'pixelated',display:'block'}}/>
            </div>
          </div>

          {/* Overlay controls */}
          {overlay && (
            <div style={{border:'1px solid var(--border)',padding:'10px 12px',width:320,display:'flex',flexDirection:'column',gap:8}}>
              <div style={{fontSize:8,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--ink2)'}}>Image Overlay</div>
              <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontSize:8,color:'var(--ink2)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Opacity</span>
                <input type="range" min="0.1" max="1" step="0.05" value={overlay.opacity}
                  onChange={e=>setOverlay(v=>({...v,opacity:parseFloat(e.target.value)}))}
                  style={{flex:1,height:2,accentColor:'var(--ink)'}}/>
                <span style={{fontSize:8,color:'var(--ink2)',minWidth:28}}>{Math.round(overlay.opacity*100)}%</span>
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontSize:8,color:'var(--ink2)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Scale</span>
                <input type="range" min="0.2" max="3" step="0.1" value={overlay.scale}
                  onChange={e=>setOverlay(v=>({...v,scale:parseFloat(e.target.value)}))}
                  style={{flex:1,height:2,accentColor:'var(--ink)'}}/>
                <span style={{fontSize:8,color:'var(--ink2)',minWidth:28}}>{overlay.scale.toFixed(1)}×</span>
              </div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                <button className={`toggle-btn${!overlay.locked?' active':''}`} style={{fontSize:8,padding:'4px 10px'}}
                  onClick={()=>setOverlay(v=>({...v,locked:!v.locked}))}>
                  {overlay.locked?'🔒 Locked':'↔ Move'}
                </button>
                <button className="toggle-btn" style={{fontSize:8,padding:'4px 10px'}}
                  onClick={()=>{applyOverlay('merge');}}> Apply (Merge)</button>
                <button className="toggle-btn" style={{fontSize:8,padding:'4px 10px'}}
                  onClick={()=>{applyOverlay('replace');}}>Apply (Replace)</button>
                <button className="toggle-btn" style={{fontSize:8,padding:'4px 10px'}}
                  onClick={()=>setOverlay(null)}>✕ Remove</button>
              </div>
            </div>
          )}

          {/* Legend */}
          <div style={{fontSize:8,color:'var(--ink2)',letterSpacing:'0.07em',textTransform:'uppercase',textAlign:'center',lineHeight:1.8}}>
            Left-click draw · Right-click erase · Two-finger zoom
          </div>

          {/* Scan button */}
          <button className="btn btn-fill" style={{width:320,justifyContent:'center'}} onClick={scan} disabled={scanning}>
            {scanning?`SCANNING ${scanProg} / ${scanTotal}`:'↺ SCAN ALL NORMIES →'}
          </button>
          {scanning&&scanTotal>0&&(
            <div style={{width:320,height:2,background:'var(--bg2)',border:'1px solid var(--border)'}}>
              <div style={{height:'100%',background:'var(--ink)',width:`${(scanProg/scanTotal)*100}%`,transition:'width 0.2s'}}/>
            </div>
          )}
          {scanMsg&&<div style={{fontSize:8,color:'var(--ink2)',letterSpacing:'0.08em',textAlign:'center',textTransform:'uppercase',maxWidth:320}}>{scanMsg}</div>}
        </div>

        {/* ── Right: top 10 matches ── */}
        {matches.length>0&&(
          <div style={{flex:1,minWidth:280,maxWidth:400}}>
            <div style={{fontSize:9,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--ink2)',marginBottom:12}}>
              Top {matches.length} Closest Normies {scanning&&<span style={{opacity:0.5}}>(live)</span>}
            </div>
            <div style={{border:'1px solid var(--border)'}}>
              {matches.map((m,i)=>{
                const userBits=pixels.map(c=>c===BG?'0':'1').join('');
                const isOpen=diffToken&&diffToken.id===m.id;
                return (
                  <div key={m.id} style={{borderBottom:i<matches.length-1?'1px solid var(--border)':'none'}}>
                    <div style={{display:'flex',gap:10,alignItems:'center',padding:'10px 12px'}}>
                      <span style={{fontFamily:'var(--ff-head)',fontSize:12,minWidth:18,color:'var(--ink2)'}}>#{i+1}</span>
                      <img src={`${NORMIES_API}/normie/${m.id}/image.png`} alt={`#${m.id}`}
                        style={{width:40,height:40,imageRendering:'pixelated',border:'1px solid var(--border)',flexShrink:0,filter:'grayscale(100%)',cursor:'pointer'}}
                        onClick={()=>window.open(`https://opensea.io/assets/ethereum/${CONTRACT}/${m.id}`,'_blank')}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontFamily:'var(--ff-head)',fontSize:10,textTransform:'uppercase',cursor:'pointer'}}
                          onClick={()=>window.open(`https://opensea.io/assets/ethereum/${CONTRACT}/${m.id}`,'_blank')}>
                          Normie #{m.id} ↗
                        </div>
                        <div style={{fontSize:8,color:'var(--ink2)',marginTop:2,letterSpacing:'0.06em'}}>{m.diff} / 1600 pixels differ</div>
                        <div style={{marginTop:3,height:2,background:'var(--bg2)',border:'1px solid var(--border)'}}>
                          <div style={{height:'100%',background:'var(--ink)',width:`${((1600-m.diff)/1600)*100}%`}}/>
                        </div>
                      </div>
                      <button className={`toggle-btn${isOpen?' active':''}`}
                        style={{padding:'3px 8px',fontSize:7,flexShrink:0,touchAction:'manipulation'}}
                        onClick={()=>setDiffToken(isOpen?null:{id:m.id,bits:m.bits})}>DIFF</button>
                    </div>
                    {isOpen&&<DiffCanvas userBits={userBits} normieBits={m.bits} sz={SZ}/>}
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:8,display:'flex',gap:12,fontSize:8,letterSpacing:'0.07em',textTransform:'uppercase',color:'var(--ink2)',flexWrap:'wrap'}}>
              <span><span style={{display:'inline-block',width:9,height:9,background:'#EE4444',verticalAlign:'middle',marginRight:4}}/>Canvas has pixel — Normie does not</span>
              <span><span style={{display:'inline-block',width:9,height:9,background:'#4488EE',verticalAlign:'middle',marginRight:4}}/>Normie has extra pixel</span>
            </div>
          </div>
        )}
      </div>
      </div>
    </div>
  );
}


function App() {
  const [page,        setPage]        = React.useState("hunter");
  const [dark,        setDark]        = React.useState(false);
  const [items,       setItems]       = React.useState([]);
  const [ethUsd,      setEthUsd]      = React.useState(null);
  const [floor,       setFloor]       = React.useState(null);
  const [floorSym,    setFloorSym]    = React.useState("ETH");
  const [vol24,       setVol24]       = React.useState(null);
  const [owners,      setOwners]      = React.useState(null);
  const [status,      setStatus]      = React.useState("idle");
  const [loadError,   setLoadError]   = React.useState(null);
  const [loaded,      setLoaded]      = React.useState(0);
  const [total,       setTotal]       = React.useState(0);
  const [lastSync,    setLastSync]    = React.useState(null);
  const [search,      setSearch]      = React.useState("");
  const [onlyAP,      setOnlyAP]      = React.useState(false);
  const [calcPx,      setCalcPx]      = React.useState("");

  React.useEffect(() => {
    document.body.classList.toggle("dark", dark);
  }, [dark]);

  const load = React.useCallback(async () => {
    setStatus("loading"); setLoadError(null); setItems([]);
    setLoaded(0); setTotal(0);
    const [ep] = await Promise.all([
      fetchEthUsd().catch(()=>null),
      apiStats().then(s => {
        setFloor(s?.total?.floor_price);
        setFloorSym(s?.total?.floor_price_symbol||"ETH");
        setVol24(s?.total?.one_day_volume);
        setOwners(s?.total?.num_owners);
      }).catch(()=>null),
    ]);
    setEthUsd(ep);

    let listings = [];
    try {
      const data = await apiListings();
      const raw = (data.listings||[]).map(l=>({tokenId:parseTok(l),priceEth:parseEth(l)})).filter(i=>i.tokenId!=null&&i.priceEth>0);
      // Deduplicate: per tokenId keep only the lowest listed price
      const best = new Map();
      for (const item of raw) {
        const existing = best.get(item.tokenId);
        if (!existing || item.priceEth < existing.priceEth) best.set(item.tokenId, item);
      }
      listings = [...best.values()];
    } catch(e) {
      setLoadError("COULD NOT LOAD OPENSEA LISTINGS\n\nCause: CORS blocked by browser.\n\nThis works fine when deployed on Vercel.\nLocally: install a CORS browser extension.\n\n"+e.message);
      setStatus("error"); return;
    }

    const sk = listings.map(i=>({...i,loading:true}));
    setItems(sk); setTotal(sk.length); setStatus("done"); setLastSync(new Date());

    const enriched = [...sk]; let done = 0;
    await Promise.all(sk.map(async(item,idx) => {
      try {
        const meta  = await apiMeta(item.tokenId);
        const attrs = meta.attributes||[];
        // DEBUG: log first token's raw attributes so we can verify trait names
        if (idx === 0) console.log('[PixelHunter] raw attrs for token', item.tokenId, JSON.stringify(attrs));
        const px = parseInt(attrs.find(a=>a.trait_type==="Pixel Count")?.value)||null;
        const ap = (() => {
          const a = attrs.find(a=>typeof a.trait_type==="string"&&(
            a.trait_type.toUpperCase()==="ACTION POINTS"||
            a.trait_type.toUpperCase()==="ACTION POINT"||
            a.trait_type.toLowerCase()==="ap"||
            a.trait_type.toLowerCase().includes("canvas point")
          ));
          if (!a) {
            // DEBUG: log all trait_types so we can find the right name
            if (idx < 3) console.log('[PixelHunter] AP trait NOT found. All trait_types:', attrs.map(a=>a.trait_type));
            return 0;
          }
          const v = typeof a.value === "number" ? a.value : parseInt(a.value);
          return isNaN(v) ? 0 : v;
        })();
        const traits = attrs.filter(a=>a.trait_type!=="Pixel Count"&&a.trait_type!=="Level"&&typeof a.value==="string");
        enriched[idx] = {...item,loading:false,pixelCount:px,existingAP:ap,traits,imageUrl:`${NORMIES_API}/normie/${item.tokenId}/image.png`};
      } catch { enriched[idx]={...item,loading:false,error:true}; }
      done++; setLoaded(done); setItems([...enriched]);
    }));
  }, []);

  React.useEffect(() => { load(); }, []);

  const displayed = React.useMemo(() => {
    let list = items.filter(i=>!i.loading&&!i.error&&i.pixelCount!=null&&i.priceEth!=null);
    if (search.trim()) list = list.filter(i=>String(i.tokenId).includes(search.trim()));
    if (onlyAP) list = list.filter(i=>(i.existingAP||0)>0);
    const safeVal = (v) => (!v||!isFinite(v)) ? 9999999 : v;
    return [...list].sort((a,b) => {
      const ca = ethUsd ? calcCPP(a.pixelCount,a.existingAP||0,a.priceEth,ethUsd) : null;
      const cb = ethUsd ? calcCPP(b.pixelCount,b.existingAP||0,b.priceEth,ethUsd) : null;
      return safeVal(ca?.best) - safeVal(cb?.best);
    });
  }, [items, search, onlyAP, ethUsd]);

  const bestCPP = React.useMemo(() => {
    if (!ethUsd||!displayed.length) return 1;
    const cs = displayed.map(i=>calcCPP(i.pixelCount,i.existingAP||0,i.priceEth,ethUsd).best).filter(isFinite);
    return cs.length?Math.min(...cs):1;
  }, [displayed, ethUsd]);

  const inProgress = loaded<total && status==="done";
  const medals = ["#1","#2","#3"];

  return (
    <div>
      {/* NAV */}
      <nav>
        <div className="nav-tabs">
          <button className={`nav-tab${page==="hunter"?" active":""}`} onClick={()=>setPage("hunter")}>Pixel Hunter</button>
          <button className={`nav-tab${page==="canvas"?" active":""}`} onClick={()=>setPage("canvas")}>Normie Hunter</button>
        </div>
      </nav>

      {page==="canvas" && <NormieHunter/>}
      {page==="hunter" && <div className="page">

        {/* HERO */}
        <div className="hero">
          <div className="hero-label">Normies NFT · Burn Value Calculator · On-Chain Data</div>
          <h1>DoPhil's<br/>Pixel Hunter</h1>
          <p className="hero-sub">
            Find the cheapest action points on the market.<br/>
            Every listing is scored by real cost-per-pixel in USD,<br/>
            accounting for burn luck, existing AP, and pixel tier.
          </p>
          <div className="hero-actions">
            <button className="btn btn-fill" onClick={load}>↺ REFRESH DATA →</button>
            <button className="btn" onClick={()=>window.open(`https://opensea.io/collection/${SLUG}`,"_blank")}>VIEW COLLECTION →</button>
            {lastSync&&<span style={{fontSize:9,color:"var(--ink2)",letterSpacing:"0.08em"}}>LAST SYNC: {lastSync.toLocaleTimeString()}</span>}
          </div>
        </div>

        {/* STATS */}
        <div className="stats-row">
          <div className="stat-cell">
            <div className="stat-label">Floor Price</div>
            <div className="stat-value">{floor?`${parseFloat(floor).toFixed(4)}`:"—"}</div>
            <div className="stat-sub">{floorSym}</div>
          </div>
          <div className="stat-cell">
            <div className="stat-label">Floor USD</div>
            <div className="stat-value">{floor&&ethUsd?$(parseFloat(floor)*ethUsd):"—"}</div>
            <div className="stat-sub">Live rate</div>
          </div>
          <div className="stat-cell">
            <div className="stat-label">ETH Price</div>
            <div className="stat-value">{ethUsd?`$${ethUsd.toLocaleString()}`:"—"}</div>
            <div className="stat-sub">CoinGecko</div>
          </div>
          <div className="stat-cell">
            <div className="stat-label">24H Volume</div>
            <div className="stat-value">{vol24?parseFloat(vol24).toFixed(2):"—"}</div>
            <div className="stat-sub">{floorSym}</div>
          </div>
          <div className="stat-cell">
            <div className="stat-label">Owners</div>
            <div className="stat-value">{owners?N(owners):"—"}</div>
            <div className="stat-sub">Unique wallets</div>
          </div>
          <div className="stat-cell">
            <div className="stat-label">Listings</div>
            <div className="stat-value">{total||"—"}</div>
            <div className="stat-sub">Scanned</div>
          </div>
        </div>

        {/* PIXEL CALCULATOR */}
        {ethUsd && (() => {
          const targetAP = parseInt(calcPx);
          const valid    = !isNaN(targetAP) && targetAP > 0;

          // Greedy: sort all loaded items by $/AP for a given scenario, fill until target reached
          const greedySolve = (scenario) => {
            // scenario: 'best' | 'mid' | 'worst'
            const pool = displayed.map(item => {
              const c    = calcCPP(item.pixelCount, item.existingAP||0, item.priceEth, ethUsd);
              const tier = c.tier;
              const midPct = (tier.minPct + tier.maxPct) / 2;
              const apScenario =
                scenario==='best'  ? c.totMax :
                scenario==='worst' ? c.totMin :
                (item.existingAP||0) + Math.floor(item.pixelCount * midPct / 100);
              const usd  = c.priceUsd;
              const cpa  = apScenario > 0 ? usd / apScenario : Infinity; // cost per AP
              return { item, c, apScenario, usd, cpa };
            }).filter(e => e.apScenario > 0 && isFinite(e.cpa))
              .sort((a,b) => a.cpa - b.cpa);

            let remaining = targetAP, totalUsd = 0, burns = [];
            for (const e of pool) {
              if (remaining <= 0) break;
              burns.push(e);
              remaining -= e.apScenario;
              totalUsd  += e.usd;
            }
            const covered = remaining <= 0;
            return { burns, totalUsd, covered, remaining };
          };

          const best  = valid ? greedySolve('best')  : null;
          const mid   = valid ? greedySolve('mid')   : null;
          const worst = valid ? greedySolve('worst') : null;

          // Candidates: all items that contribute to best-case plan, sorted by cpa
          const candidates = valid ? (best?.burns || []).slice(0, 10) : [];

          return (
            <div className="calc-section">
              <div className="section-label">Burn Cost Calculator</div>
              <div className="calc-input-row">
                <span className="filter-label">Target AP</span>
                <input type="number" value={calcPx} onChange={e=>setCalcPx(e.target.value)}
                  placeholder="How many AP do you need?"
                  style={{width:220}} min="1" max="99999"/>
              </div>

              {valid && best && (<>
                <div className="calc-grid">
                  <div className="calc-cell">
                    <div className="calc-cell-label">🍀 Best Case (4% luck each)</div>
                    <div className="calc-cell-value">{best.covered ? $(best.totalUsd) : "—"}</div>
                    <div className="calc-cell-sub">
                      {best.covered
                        ? `${best.burns.length} NFT${best.burns.length>1?'s':''} · ${best.burns.reduce((s,e)=>s+e.apScenario,0)} AP total`
                        : `Only ${targetAP - Math.max(0,best.remaining)} AP coverable from listings`}
                    </div>
                  </div>
                  <div className="calc-cell">
                    <div className="calc-cell-label">⚖ Mid (avg luck each)</div>
                    <div className="calc-cell-value">{mid.covered ? $(mid.totalUsd) : "—"}</div>
                    <div className="calc-cell-sub">
                      {mid.covered
                        ? `${mid.burns.length} NFT${mid.burns.length>1?'s':''} · ${mid.burns.reduce((s,e)=>s+e.apScenario,0)} AP total`
                        : `Not fully coverable at avg luck`}
                    </div>
                  </div>
                  <div className="calc-cell">
                    <div className="calc-cell-label">💀 Worst Case (min% luck each)</div>
                    <div className="calc-cell-value">{worst.covered ? $(worst.totalUsd) : "—"}</div>
                    <div className="calc-cell-sub">
                      {worst.covered
                        ? `${worst.burns.length} NFT${worst.burns.length>1?'s':''} · ${worst.burns.reduce((s,e)=>s+e.apScenario,0)} AP total`
                        : `Not fully coverable at min luck`}
                    </div>
                  </div>
                </div>
                <div style={{fontSize:8,color:"var(--ink2)",letterSpacing:"0.08em",marginBottom:14,textTransform:"uppercase"}}>
                  ↑ Greedy selection from live listings — each NFT uses its own tier% based on pixel count
                </div>

                {candidates.length > 0 && (<>
                  <div style={{fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--ink2)",marginBottom:8}}>
                    Cheapest NFTs For Your Burn (best-case plan · {candidates.length} selected)
                  </div>
                  <div className="calc-candidates">
                    {candidates.map((e, i) => {
                      const {item, c, apScenario} = e;
                      return (
                        <div key={item.tokenId} className="calc-candidate-row"
                          onClick={()=>window.open(`https://opensea.io/assets/ethereum/${CONTRACT}/${item.tokenId}`,"_blank")}>
                          <span style={{fontFamily:"var(--ff-head)",fontSize:11,minWidth:20,color:"var(--ink2)"}}>#{i+1}</span>
                          <div style={{flex:1}}>
                            <span style={{fontFamily:"var(--ff-head)",fontSize:11,textTransform:"uppercase"}}>Normie #{item.tokenId}</span>
                            <span style={{marginLeft:8,fontSize:8,color:"var(--ink2)",letterSpacing:"0.06em"}}>{item.pixelCount}px · {c.tier.label}</span>
                            {item.existingAP>0&&<span style={{marginLeft:6,fontSize:8,color:"var(--ink2)"}}>✓ {item.existingAP} AP</span>}
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"var(--ff-head)",fontSize:13}}>{Ξ(item.priceEth)}</div>
                            <div className="calc-cand-sub" style={{fontSize:8,color:"var(--ink2)",letterSpacing:"0.06em"}}>
                              {c.totMin}–{c.totMax} AP · best {apScenario} AP
                            </div>
                          </div>
                          <span style={{fontSize:8,color:"var(--ink2)"}}>↗</span>
                        </div>
                      );
                    })}
                  </div>
                </>)}

                {candidates.length === 0 && (
                  <div style={{fontSize:9,color:"var(--ink2)",letterSpacing:"0.08em",textTransform:"uppercase",textAlign:"center",padding:"20px 0"}}>
                    No listings loaded yet — refresh data first.
                  </div>
                )}
              </>)}
            </div>
          );
        })()}

        {/* FILTERS */}
        <div className="filters-bar">
          <div className="filter-group">
            <span className="filter-label">Search</span>
            <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Token ID..."/>
          </div>
          <button className={`toggle-btn${onlyAP?" active":""}`} onClick={()=>setOnlyAP(v=>!v)}>WITH AP ONLY</button>
          <span className="results-count">{displayed.length} RESULTS</span>
        </div>

        {/* TOP 3 */}
        {displayed.length>=3&&ethUsd&&(
          <div className="top3-section">
            <div className="section-label">Top 3 Deals — Best Cost Per Pixel</div>
            <div className="top3-grid">
              {displayed.slice(0,3).map((item,i)=>{
                const c=calcCPP(item.pixelCount,item.existingAP||0,item.priceEth,ethUsd);
                return (
                  <div key={item.tokenId} className="top3-card"
                    onClick={()=>window.open(`https://opensea.io/assets/ethereum/${CONTRACT}/${item.tokenId}`,"_blank")}>
                    <div className="top3-medal">{["🥇","🥈","🥉"][i]}</div>
                    <div>
                      <div className="top3-name">Normie #{item.tokenId}</div>
                      <div className="top3-price">{$(c.best)} / px</div>
                      <div className="top3-sub">{Ξ(item.priceEth)} · {item.pixelCount}px · {c.totMax} AP max</div>
                      {item.existingAP>0
                        ? <div className="top3-ap">✓ {item.existingAP} AP guaranteed + 🎲 {c.luckMin}–{c.luckMax} from pixels</div>
                        : <div className="top3-ap">🎲 {c.luckMin}–{c.luckMax} AP from pixels</div>
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* PROGRESS */}
        {inProgress&&(
          <div className="progress-bar-wrap">
            <div className="progress-bar-info">
              <span>Loading pixel data from Normies API...</span>
              <span>{loaded} / {total}</span>
            </div>
            <div className="progress-track">
              <div className="progress-fill" style={{width:`${(loaded/total)*100}%`}}/>
            </div>
          </div>
        )}

        {/* LOADING */}
        {status==="loading"&&items.length===0&&(
          <div className="loading-state">
            <div style={{fontFamily:"var(--ff-head)",fontSize:28}} className="blink">▌</div>
            <div className="loading-text">Connecting to OpenSea + CoinGecko...</div>
          </div>
        )}

        {/* ERROR */}
        {status==="error"&&(
          <div className="error-box">
            <div className="error-title">⚠ Failed to Load</div>
            <div className="error-body">{loadError}</div>
            <button className="btn btn-sm" style={{marginTop:16}} onClick={load}>RETRY →</button>
          </div>
        )}

        {/* NFT GRID */}
        {displayed.length>0&&(
          <div className="nft-section">
            <div className="section-label">{displayed.length} Listings — Sorted by $/px (best case)</div>
            <div className="nft-grid">
              {displayed.map((item,idx)=>(
                <NFTCard key={item.tokenId} item={item} rank={idx+1} ethUsd={ethUsd} bestCPP={bestCPP}/>
              ))}
            </div>
          </div>
        )}

        {/* SKELETONS */}
        {items.filter(i=>i.loading).length>0&&(
          <div className="skeleton-grid">
            {items.filter(i=>i.loading).slice(0,8).map((item,i)=>(
              <div key={item.tokenId} className="skeleton-card">
                <div className="skeleton-img" style={{animationDelay:`${i*0.08}s`}}/>
                <div className="skeleton-body">
                  <div className="skeleton-line" style={{width:"60%"}}/>
                  <div className="skeleton-line" style={{width:"80%"}}/>
                  <div className="skeleton-line" style={{width:"45%"}}/>
                </div>
              </div>
            ))}
          </div>
        )}

        {status==="done"&&displayed.length===0&&loaded===total&&total>0&&(
          <div style={{padding:"60px 0",textAlign:"center",fontSize:10,color:"var(--ink2)",letterSpacing:"0.1em",textTransform:"uppercase"}}>No listings match your filters.</div>
        )}

      </div>}

      {/* FOOTER */}
      <footer>
        <span className="footer-text">
          <a href="https://x.com/xbtphil" target="_blank" style={{color:"var(--ink2)",textDecoration:"none",letterSpacing:"0.1em"}} onMouseEnter={e=>e.target.style.color="var(--ink)"} onMouseLeave={e=>e.target.style.color="var(--ink2)"}>DoPhil</a>
          {" · "}
          <a href="https://x.com/normiesART" target="_blank" style={{color:"var(--ink2)",textDecoration:"none",letterSpacing:"0.1em"}} onMouseEnter={e=>e.target.style.color="var(--ink)"} onMouseLeave={e=>e.target.style.color="var(--ink2)"}>Normies NFT</a>
          {" · On-Chain Data"}
        </span>
        <span className="footer-text">{CONTRACT.slice(0,14)}... · api.normies.art · OpenSea API</span>
        {page==="hunter"&&lastSync&&<span className="footer-text">Last sync: {lastSync.toLocaleTimeString()}</span>}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
